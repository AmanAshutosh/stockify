<!DOCTYPE html>
<html>
<head>
  <title>Stockify</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <div class="nav-inner">
    <h2 class="logo">Stockify</h2>
    <div class="links">
      <a href="/pages/marketplace.html">Explore</a>
      <a href="/pages/login.html">Login</a>
    </div>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-overlay">
    <h1>Discover High-Quality Stock Photos</h1>
    <p>Built for creators. Designed for businesses.</p>

    <div class="search">
      <input placeholder="Search photos..." onclick="goExplore()">

    <div class="card">

    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1495567720989-cebdbdd97913">
    </div>
  </div>
</section>

<!-- CTA -->
<section style="text-align:center; padding:60px 20px;">
  <h2>Start Exploring Now</h2>
  <p style="color:#aaa; margin:10px 0;">
    Thousands of high-quality images ready to use.
  </p>

  <a href="/pages/marketplace.html" class="primary-btn">
    Explore Marketplace
  </a>
</section>

<script>
function goExplore() {
  window.location.href = "/pages/marketplace.html";
}
</script>

<script src="js/main.js"></script>

</html>
